name: Build Linux x64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-linux-x64:
    name: Linux x64 release ZIP
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libsecret-1-dev \
            libnotify-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libmpv-dev \
            mpv \
            zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Linux x64
        working-directory: client
        run: flutter build linux --release

      - name: Create ZIP
        working-directory: client/build/linux/x64/release/bundle
        run: zip -r "$GITHUB_WORKSPACE/secure-p2p-linux-x64.zip" .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-p2p-linux-x64
          path: secure-p2p-linux-x64.zip
          if-no-files-found: error
